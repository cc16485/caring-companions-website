<script>
(function () {
'use strict';
function readJSON(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch (e) { return null; } }

var flags = readJSON('cc-workspace-flags') || {};
var dc = readJSON('cc-decision-center-progress');
var academy = readJSON('cc-family-academy-progress');

var done = { color: '#0e6b5c', bg: '#e8f3ef', status: 'Complete' };
var notStarted = { color: '#8a978f', bg: '#f2f0e9', status: 'Not Started' };
var inProgress = { color: '#96692a', bg: '#fbf6ec', status: 'In Progress' };

function pick(cond, yes) { return cond ? yes : notStarted; }

var items = [
  { label: 'Digital Care Assessment', detail: 'Your recommended care level and cost estimate', href: 'assessment.html', s: pick(flags.assessment, done) },
  { label: 'Home Safety Assessment', detail: 'Room-by-room fall risk check', href: 'home-safety-check.html', s: pick(flags.homeSafety, done) },
  { label: 'Hospital Discharge Plan', detail: 'Recovery timeline and equipment checklist', href: 'care-paths/hospital-discharge.html', s: pick(flags.hospitalDischarge, done) },
  { label: 'Paying for Care', detail: 'Payment options for your situation', href: 'care-paths/paying-for-care.html', s: pick(flags.payingForCare, done) },
  { label: 'Decision Center Journey', detail: dc ? 'In progress — step ' + (dc.stepIndex + 1) + ' of 5' : 'Not started yet', href: 'decision-center.html', s: pick(dc, inProgress) },
  { label: 'Family Academy', detail: academy && Object.keys(academy).length ? 'Lessons in progress' : 'No courses started yet', href: 'family-academy.html', s: pick(academy && Object.keys(academy).length, inProgress) },
  { label: 'Family Checklist', detail: 'Documents, home safety, equipment, and care setup', href: 'family-checklist.html', s: pick(flags.checklistStarted, inProgress) },
  { label: 'Care Costs Calculator', detail: 'Compare home care against assisted living, memory care, and nursing home', href: 'cost-calculator.html', s: notStarted },
  { label: 'Compare Care Options', detail: 'Home Care vs. Assisted Living vs. Memory Care vs. Nursing Home', href: 'compare-care.html', s: notStarted },
  { label: 'How We Decide', detail: 'Our transparency page on recommendations and pricing', href: 'how-we-decide.html', s: notStarted },
  { label: 'Family Meeting Planner', detail: 'Agenda, discussion guide, and decision worksheet', href: 'family-meeting-planner.html', s: notStarted },
  { label: 'Decision Journal', detail: 'Record why you made the choices you did', href: 'decision-journal.html', s: pick(flags.journalStarted, inProgress) },
  { label: 'Facility Comparison', detail: 'Side-by-side notes on facilities you tour', href: 'facility-comparison.html', s: pick(flags.facilityComparisonStarted, inProgress) },
  { label: 'Agency Interview Notes', detail: 'A worksheet for each agency you call', href: 'agency-interview-notes.html', s: pick(flags.agencyInterviewsStarted, inProgress) },
];

var wrap = document.getElementById('workspace-items');
items.forEach(function (item) {
  var a = document.createElement('a');
  a.className = 'fw-item';
  a.href = item.href;
  var text = document.createElement('div');
  var label = document.createElement('p');
  label.style.cssText = 'font-size:15px;font-weight:600;color:#122236;margin:0 0 4px';
  label.textContent = item.label;
  var detail = document.createElement('p');
  detail.style.cssText = 'font-size:13px;color:#55677a;margin:0';
  detail.textContent = item.detail;
  text.appendChild(label);
  text.appendChild(detail);
  var status = document.createElement('span');
  status.style.cssText = 'font-size:11.5px;font-weight:700;border-radius:10px;padding:5px 12px;white-space:nowrap;color:' + item.s.color + ';background:' + item.s.bg;
  status.textContent = item.s.status;
  a.appendChild(text);
  a.appendChild(status);
  wrap.appendChild(a);
});
})();
</script>
<script src="assets/cara-widget.js"></script>
<script src="assets/site-events.js"></script>
</body>
