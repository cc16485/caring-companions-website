<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Love Still Lives Here | The Dementia Journey | Caring Companions</title>
<meta name="description" content="The ending of The Dementia Journey: a free course for families caring for someone they love. The relationship may be changing, but love still lives here.">
<link rel="canonical" href="https://mo-care.com/dementia-journey/love-still-lives-here">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Caring Companions In-Home Senior Care">
<meta property="og:title" content="Love Still Lives Here | The Dementia Journey">
<meta property="og:description" content="The relationship may be changing, but love still lives here. The ending of a free course for family caregivers.">
<meta property="og:url" content="https://mo-care.com/dementia-journey/love-still-lives-here">
<meta property="og:image" content="https://mo-care.com/assets/photos/hero-caregiver.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/site.css">
<style>
:root { --dj-cream:#faf8f3; --dj-card:#fffdf8; --dj-navy:#143A5E; --dj-navy-deep:#0e2c49; --dj-gold:#EFCE85; --dj-gold-deep:#c79a3b; --dj-gold-ink:#a87f2c; --dj-ink:#2c3d4d; --dj-muted:#55677a; }
body { background: var(--dj-cream); }
.dj-shell { max-width: 760px; margin: 0 auto; padding: 22px 20px 90px; font-family:'Inter',Helvetica,Arial,sans-serif; color:#16283a; }
.dj-top { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.dj-top a.back { font-size:13px; font-weight:600; color:var(--dj-muted); text-decoration:none; margin-right:auto; }
.dj-pill { display:inline-flex; align-items:center; gap:7px; background:#fff; border:1.5px solid #e2dbc9; border-radius:999px; padding:7px 13px; font-size:12px; font-weight:700; color:var(--dj-muted); cursor:pointer; font-family:inherit; }
.dj-pill.on { border-color:var(--dj-gold-deep); color:var(--dj-gold-ink); background:#fbf3dd; }
.dj-card { background:var(--dj-card); border:1px solid #ece4d2; border-radius:22px; padding:40px 36px; box-shadow:0 16px 44px rgba(20,58,94,0.07); }
.dj-cine { background:linear-gradient(150deg,#0e2c49 0%, #1b4266 58%, #2a5478 100%); border:none; position:relative; overflow:hidden; }
.dj-cine::after { content:""; position:absolute; right:-70px; top:-70px; width:290px; height:290px; border-radius:50%; background:radial-gradient(circle,rgba(239,206,133,.30),transparent 66%); pointer-events:none; }
.dj-cine > * { position:relative; }
.dj-kicker { font-size:11.5px; font-weight:700; color:var(--dj-gold-ink); text-transform:uppercase; letter-spacing:.09em; margin:0 0 12px; }
.dj-cine .dj-kicker { color:var(--dj-gold); }
.dj-title { font-family:'Source Serif 4',Georgia,serif; font-size:30px; font-weight:600; color:var(--dj-navy); margin:0 0 12px; line-height:1.3; text-wrap:balance; }
.dj-cine .dj-title { color:#fbf7ee; font-size:38px; }
.dj-lead { font-size:15.5px; line-height:1.75; color:var(--dj-ink); margin:0 0 16px; }
.dj-cine .dj-lead { color:#c9d4de; }
.mont { border-radius:16px; padding:22px 24px; margin-bottom:12px; background:rgba(239,206,133,.10); border:1px solid rgba(239,206,133,.25); opacity:0; transition:opacity 1.4s ease; }
.mont p.who { font-size:11px; font-weight:700; color:var(--dj-gold); text-transform:uppercase; letter-spacing:.08em; margin:0 0 6px; }
.mont p.what { font-family:'Source Serif 4',Georgia,serif; font-size:16.5px; line-height:1.7; color:#f3efe4; margin:0; }
.closing p { font-family:'Source Serif 4',Georgia,serif; font-size:19px; line-height:2.0; color:#f3efe4; margin:0 0 18px; opacity:0; transition:opacity 1.6s ease; text-align:center; }
.dj-next { display:block; width:100%; margin-top:24px; background:var(--dj-gold); color:var(--dj-navy-deep); border:none; border-radius:999px; padding:16px 26px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; }
.dj-next:hover { background:#e8c46f; }
.dj-next.soft { background:transparent; color:var(--dj-navy); border:1.5px solid #d8d2c2; }
.dj-cine .dj-next.soft { color:var(--dj-gold); border-color:rgba(239,206,133,.45); }
.act { display:flex; gap:14px; align-items:center; background:#f7f2e6; border-radius:14px; padding:16px 18px; margin-bottom:10px; text-decoration:none; }
.act p.t { font-size:14.5px; font-weight:700; color:var(--dj-navy); margin:0 0 2px; }
.act p.d { font-size:13px; line-height:1.55; color:var(--dj-muted); margin:0; }
.cert { background:#fffdf6; border:2.5px solid #d9b45b; border-radius:6px; padding:52px 40px; position:relative; text-align:center; }
.cert::before { content:""; position:absolute; inset:10px; border:1px solid #ead9ac; pointer-events:none; }
.cert .small { font-size:11px; font-weight:700; color:var(--dj-gold-ink); text-transform:uppercase; letter-spacing:.16em; margin:0 0 18px; }
.cert h2 { font-family:'Source Serif 4',Georgia,serif; font-size:26px; font-weight:600; color:var(--dj-navy); margin:0 0 20px; }
.cert .nm { font-family:'Source Serif 4',Georgia,serif; font-size:34px; font-weight:600; color:var(--dj-navy); border-bottom:1.5px solid #d9b45b; display:inline-block; padding:0 26px 6px; margin-bottom:20px; min-width:240px; }
.cert p.body { font-family:'Source Serif 4',Georgia,serif; font-size:15.5px; line-height:1.8; color:#2c3d4d; max-width:430px; margin:0 auto 22px; }
.cert p.date { font-size:12.5px; color:#8a97a3; margin:0 0 4px; }
.cert p.sig { font-family:'Source Serif 4',Georgia,serif; font-style:italic; font-size:16px; color:var(--dj-navy); margin:0; }
textarea.dj-ta, input.dj-in { width:100%; border:1.5px solid #ddd3ba; border-radius:12px; padding:13px 15px; font-size:15px; font-family:inherit; color:#16283a; background:#fffdf8; }
@media (min-width:880px){ .dj-shell { max-width:900px; } }
@media (max-width:560px){ .dj-card { padding:26px 20px; } .dj-cine .dj-title { font-size:28px; } .closing p { font-size:16.5px; } .cert { padding:36px 20px; } }
@media print {
  body * { visibility:hidden; }
  #certCard, #certCard * { visibility:visible; }
  #certCard { position:absolute; inset:0; background:#fff; }
  .noprint { display:none !important; }
}
</style>
</head>
<body>
<div class="dj-shell">
<div class="dj-top noprint">
<a class="back" href="/dementia-journey/">&larr; The Dementia Journey</a>
<button class="dj-pill on" id="voiceBtn" type="button" aria-pressed="true"><svg style="width:14px;height:14px" aria-hidden="true"><use href="/assets/icons.svg#i-music"/></svg><span id="voiceLbl">Narration on</span></button>
</div>
<div id="stage"></div>
</div>

<script>
(function () {
'use strict';
var TTS = 'https://zngsgedlsxinbygwmxwn.supabase.co/functions/v1/elevenlabs-tts';

var VO = {
mont:"Before anything else... come look at what you've seen. Ellen and Ruth, folding towels on a Tuesday, nobody keeping score. Frank, playing June's song, the one from the dance hall. Marcus, letting his sister take the weekend... and letting himself watch a ballgame. Tia, with her phone recording, catching the pie story in Opal's own voice. Carol, stepping outside to breathe... then going back in. Denise and Walter, reviewing the docket like two professionals. And Opal... smiling at something nobody can name, without remembering why. None of these moments were perfect. Every one of them was real. That's the whole secret of this course.",
close1:"Dementia changes memory. It changes language. It changes routines, relationships, plans, and expectations. It may ask more of you than you ever imagined you could give. There may be days when nothing you try seems to work. There may be moments you wish you could take back. There may be grief for the person you remember... and love for the person still beside you. Both can be true.",
close2:"Your loved one may not remember every visit, every meal, every appointment, or every sacrifice. But comfort still matters. Safety still matters. Dignity still matters. A familiar song still matters. A gentle voice still matters. The feeling of not being alone... still matters. You do not have to do this perfectly. You do not have to do it without help. And you do not have to disappear in order to prove how much you love them. Caring for yourself is part of caring for them. Asking for help is part of caring for them. Adapting is part of caring for them. The relationship may be changing... but love still lives here.",
acts:"A few last things, all yours to take. Your family care plan, complete now, print it. The This Is Who I Am page. Every tool in the library, free forever, course or no course. And two small assignments, if you'll accept them. Name one support action you'll take this week. And pass this course to one other caregiver who's carrying what you carry. Somebody handed it to you, or you found it on a hard night. Be that for someone.",
cert:"One more thing... for your wall, or your drawer, or the refrigerator next to the observation sheet. Not a certification. Just a record... that in the middle of everything you carry, you spent hours learning how to love someone better through the hardest thing that ever happened to them. Type your name. You've more than earned the paper it prints on.",
done:"That's the course. All of it. Nine modules, six families, and one certificate with your name on it. Come back anytime... to any module, any tool, any phrase card. This road doesn't end at a finish line, and neither does our company on it. From me, and from everyone at Caring Companions... thank you for what you do in rooms nobody sees. Be gentle with yourself. Today, especially. Love still lives here... and one of the places it lives... is you."
};

var MONT=[
 ['Ellen & Ruth','Folding towels on a Tuesday, nobody keeping score.'],
 ['Frank & June','His hand finds the song from the dance hall. Her foot finds the beat.'],
 ['Marcus','Letting Renee take the weekend. Watching the whole ballgame.'],
 ['Tia & Opal','The phone propped on the sofa arm, recording. Forty pies, in her own voice.'],
 ['Carol','Stepping outside to breathe. Then going back in.'],
 ['Denise & Walter','Reviewing the docket like two professionals. The foreman approves.'],
 ['Opal','Smiling at something nobody can name, without remembering why.']];

var idx=0, voiceOn=true, ttsCache={};
var stage=document.getElementById('stage');
function el(id){ return document.getElementById(id); }

var player=new Audio(); var playerUnlocked=false;
var SILENCE='data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
document.addEventListener('click', function(){
  if (playerUnlocked) return;
  playerUnlocked=true;
  try { player.src=SILENCE; player.play().catch(function(){}); } catch(e){}
}, true);
function stopVoice(){ try { player.pause(); } catch(e){} }
function speak(text){
  stopVoice();
  if (!voiceOn||!text) return;
  if (ttsCache[text]){ player.src=ttsCache[text]; player.play().catch(function(){}); return; }
  fetch(TTS,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:text})})
    .then(function(r){ return r.json(); })
    .then(function(d){ if(d&&d.url){ ttsCache[text]=d.url; player.src=d.url; player.play().catch(function(){}); } })
    .catch(function(){});
}
el('voiceBtn').addEventListener('click', function(){
  voiceOn=!voiceOn;
  this.classList.toggle('on',voiceOn);
  el('voiceLbl').textContent=voiceOn?'Narration on':'Narration off';
  if(!voiceOn) stopVoice(); else speak(current());
});

function fadeSeq(sel, base, step){
  var els=stage.querySelectorAll(sel);
  els.forEach(function(e,i){ setTimeout(function(){ e.style.opacity=1; }, (base||600)+i*(step||1800)); });
}

var SCREENS=[
{ id:'mont', render:function(){
  stage.innerHTML='<div class="dj-card dj-cine">'
    +'<p class="dj-kicker">The Dementia Journey &middot; the ending</p>'
    +'<h1 class="dj-title">Love Still Lives Here</h1>'
    +'<p class="dj-lead">Before anything else, come look at what you&rsquo;ve seen. None of these moments were perfect. Every one of them was real.</p>'
    + MONT.map(function(m){ return '<div class="mont"><p class="who">'+m[0]+'</p><p class="what">'+m[1]+'</p></div>'; }).join('')
    +'<button class="dj-next" id="next">Stay for the last words</button></div>';
  fadeSeq('.mont', 700, 2100);
  wire();
}},
{ id:'close1', render:function(){
  stage.innerHTML='<div class="dj-card dj-cine closing">'
    +'<p class="dj-kicker" style="text-align:center">For you, before you go</p>'
    +'<p>Dementia changes memory. It changes language. It changes routines, relationships, plans, and expectations.</p>'
    +'<p>It may ask more of you than you ever imagined you could give.</p>'
    +'<p>There may be days when nothing you try seems to work. There may be moments you wish you could take back.</p>'
    +'<p>There may be grief for the person you remember, and love for the person still beside you.</p>'
    +'<p><em>Both can be true.</em></p>'
    +'<button class="dj-next" id="next">Go on</button></div>';
  fadeSeq('.closing p', 700, 2600);
  wire();
}},
{ id:'close2', render:function(){
  stage.innerHTML='<div class="dj-card dj-cine closing">'
    +'<p>Your loved one may not remember every visit, every meal, every appointment, or every sacrifice.</p>'
    +'<p>But comfort still matters. Safety still matters. Dignity still matters. A familiar song still matters. A gentle voice still matters. The feeling of not being alone still matters.</p>'
    +'<p>You do not have to do this perfectly. You do not have to do it without help. And you do not have to disappear in order to prove how much you love them.</p>'
    +'<p>Caring for yourself is part of caring for them. Asking for help is part of caring for them. Adapting is part of caring for them.</p>'
    +'<p><em>The relationship may be changing, but love still lives here.</em></p>'
    +'<button class="dj-next" id="next">Thank you</button></div>';
  fadeSeq('.closing p', 700, 3000);
  wire();
}},
{ id:'acts', render:function(){
  var act1='';
  try { act1=localStorage.getItem('dj_final_action')||''; } catch(e){}
  stage.innerHTML='<div class="dj-card">'
    +'<p class="dj-kicker">Yours to take</p>'
    +'<h1 class="dj-title">Before you close this tab</h1>'
    +'<a class="act" href="/dementia-journey/resources/safety-emergency-plan"><span><p class="t">Print your Safety &amp; Emergency Plan</p><p class="d">And your complete Family Care Plan lives in every module under &ldquo;My plan.&rdquo;</p></span></a>'
    +'<a class="act" href="/dementia-journey/resources/this-is-who-i-am"><span><p class="t">Print the &ldquo;This Is Who I Am&rdquo; page</p><p class="d">Copies for family, respite workers, and the go-bag.</p></span></a>'
    +'<a class="act" href="/dementia-journey/#library"><span><p class="t">The whole tool library</p><p class="d">Every printable, free forever, no course completion required.</p></span></a>'
    +'<div class="act" style="display:block"><p class="t">One support action this week</p><p class="d" style="margin-bottom:8px">Name it, the ask, the call, the appointment. Naming makes it real.</p>'
    +'<input class="dj-in" id="finalAction" placeholder="Ask Renee for the second weekend&hellip;" value="'+act1.replace(/"/g,'&quot;')+'">'
    +'</div>'
    +'<div class="act" style="display:block"><p class="t">Pass it on</p><p class="d" style="margin-bottom:8px">Somebody is carrying what you carry. Send them the course.</p>'
    +'<button class="dj-next soft" id="shareBtn" style="margin:0;width:auto;padding:11px 20px;font-size:13.5px">Copy the course link</button>'
    +'<span id="copied" style="font-size:12.5px;font-weight:700;color:var(--dj-gold-ink);margin-left:10px" hidden>Copied.</span></div>'
    +'<button class="dj-next" id="next">One more thing, for your wall</button></div>';
  el('finalAction').addEventListener('input',function(){ try{ localStorage.setItem('dj_final_action',this.value); }catch(e){} });
  el('shareBtn').addEventListener('click',function(){
    var url='https://mo-care.com/dementia-journey/';
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(function(){ el('copied').hidden=false; });
    else { el('copied').textContent=url; el('copied').hidden=false; }
  });
  wire();
}},
{ id:'cert', render:function(){
  var nm=''; try { nm=localStorage.getItem('dj_name')||''; } catch(e){}
  stage.innerHTML='<div class="dj-card">'
    +'<p class="dj-kicker">Not a certification. A record.</p>'
    +'<h1 class="dj-title">Put your name on what you did.</h1>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px" class="noprint">'
    +'<input class="dj-in" id="certName" style="flex:1;min-width:200px" placeholder="Your name, as you&rsquo;d like it to appear" value="'+nm.replace(/"/g,'&quot;')+'">'
    +'<button class="dj-next" id="applyName" style="margin:0;width:auto;padding:13px 22px;font-size:14px">Put it on the certificate</button></div>'
    +'<div class="cert" id="certCard">'
    +'<p class="small">The Dementia Journey &middot; Certificate of Completion</p>'
    +'<h2>This recognizes that</h2>'
    +'<div class="nm" id="certNm">'+(nm?nm.replace(/</g,'&lt;'):'&nbsp;')+'</div>'
    +'<p class="body">completed <b>The Dementia Journey: A Free Course for Families Caring for Someone They Love</b>, nine modules on understanding the changes, protecting the relationship, and caring without losing yourself.</p>'
    +'<p class="date" id="certDate"></p>'
    +'<p class="sig">Samantha Troutman &middot; Caring Companions In-Home Senior Care &middot; Springfield, Missouri</p>'
    +'</div>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px" class="noprint">'
    +'<button class="dj-next" id="printCert" style="margin:0;width:auto;padding:13px 24px">Print my certificate</button>'
    +'<button class="dj-next soft" id="next" style="margin:0;width:auto;padding:13px 24px">Finish</button></div>'
    +'</div>';
  el('certDate').textContent=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  el('applyName').addEventListener('click',function(){
    var v=el('certName').value.trim();
    el('certNm').textContent=v||' ';
    try { localStorage.setItem('dj_name', v); } catch(e){}
  });
  el('printCert').addEventListener('click',function(){ window.print(); });
  wire();
}},
{ id:'done', render:function(){
  stage.innerHTML='<div class="dj-card dj-cine" style="text-align:center">'
    +'<p class="dj-kicker">The Dementia Journey</p>'
    +'<h1 class="dj-title">Go gently.</h1>'
    +'<p class="dj-lead" style="max-width:480px;margin:0 auto 8px">Come back to any module, any tool, any phrase card, whenever the road asks for it. This page will keep the light on.</p>'
    +'<p class="dj-lead" style="max-width:480px;margin:0 auto"><em style="color:#e9dcbb;font-family:Georgia,serif">Love still lives here. And one of the places it lives, is you.</em></p>'
    +'<div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:26px">'
    +'<a href="/dementia-journey/" class="dj-next soft" style="width:auto;text-decoration:none">Course home</a>'
    +'<a href="/caregivers-corner" class="dj-next soft" style="width:auto;text-decoration:none">Caregivers Corner</a>'
    +'</div></div>';
  if (window.CCTrack) CCTrack('dj_course_complete');
}}
];

function current(){ return VO[SCREENS[idx].id]; }
function wire(){ var n=el('next'); if(n) n.addEventListener('click',function(){ idx++; show(); }); }
function show(){
  SCREENS[idx].render();
  window.scrollTo({top:0,behavior:'smooth'});
  if (idx>0) speak(current());
}
show();
// landing narration on first tap
document.addEventListener('click', function once(){ document.removeEventListener('click', once, true); if (idx===0) speak(VO.mont); }, true);
})();
</script>
<script src="/assets/site-events.js"></script>
</body>
</html>
